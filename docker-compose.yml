services:
  postgres:
    image: postgres:16-alpine
    container_name: copadorada-db
    environment:
      POSTGRES_USER: copadorada
      POSTGRES_PASSWORD: copadorada
      POSTGRES_DB: copadorada
    ports:
      - "5432:5432"
    volumes:
      - copadorada_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copadorada -d copadorada"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  copadorada_pgdata:
